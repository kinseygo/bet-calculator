<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>49数智能分析系统 V9</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 20px; background:#111; color:#fff;}
button { padding: 10px; margin: 5px; background:#00c3ff; border:none; color:#000;}
.result { margin-top: 20px; white-space: pre-line; }
canvas { max-width: 100%; margin-top: 20px; background:#fff;}
</style>
</head>

<body>

<h2>🔥 49数智能分析系统 V9</h2>

<button onclick="init()">一键分析</button>

<div class="result" id="output">点击按钮开始分析...</div>

<canvas id="trendChart"></canvas>

<script>

// ====== 波色 ======
const colorMap = {
  红: [1,2,7,8,12,13,18,19,23,24,29,30,34,35,40,45,46],
  蓝: [3,4,9,10,14,15,20,25,26,31,36,37,41,42,47,48],
  绿: [5,6,11,16,17,21,22,27,28,32,33,38,39,43,44,49]
};

function getColor(num){
  for(let k in colorMap){
    if(colorMap[k].includes(num)) return k;
  }
}

// ====== 连续 ======
function getLastStreak(list, fn){
  const first = fn(list[0]);
  let count=0;
  for(let i=0;i<list.length;i++){
    if(fn(list[i])===first) count++;
    else break;
  }
  return count;
}

// ====== 预测 ======
function predict(list){
  let score = {};
  for(let i=1;i<=49;i++) score[i]=0;

  const last = list[0];

  if(getLastStreak(list,n=>n%2)>=3){
    for(let i=1;i<=49;i++){
      if(i%2!==last%2) score[i]+=3;
    }
  }

  for(let i=1;i<=49;i++){
    if(getColor(i)!==getColor(last)) score[i]+=2;
  }

  if(getLastStreak(list,n=>n>=25)>=3){
    for(let i=1;i<=49;i++){
      if((i>=25)!==(last>=25)) score[i]+=2;
    }
  }

  for(let i=1;i<=49;i++){
    if(Math.floor(i/10)!==Math.floor(last/10)) score[i]+=1;
  }

  return Object.keys(score)
    .sort((a,b)=>score[b]-score[a])
    .slice(0,5);
}

// ====== 命中率 ======
function calcAccuracy(list){
  let hit = 0;
  let total = 30;

  for(let i=0;i<total;i++){
    const sub = list.slice(i+1);
    const rec = predict(sub);

    if(rec.includes(String(list[i]))) hit++;
  }

  return (hit/total*100).toFixed(2);
}

// ====== 图表 ======
function drawChart(list){
  const last50 = list.slice(0,50).reverse();
  const data = last50.map(n=> n%2===0 ? 1 : 0);

  new Chart(document.getElementById('trendChart'), {
    type:'line',
    data:{
      labels:last50.map((_,i)=>i+1),
      datasets:[{
        label:'奇偶趋势（1=偶）',
        data:data
      }]
    }
  });
}

// ====== 主逻辑 ======
async function init(){

  let list = [];

  try{
    const res = await fetch('https://api.allorigins.win/raw?url=https://ls.kjkj.fit');
    const data = await res.json();

    list = data.slice(0,200).map(item=>{
      const nums = item.numbers.split(',');
      return parseInt(nums[nums.length-1]);
    });

  }catch(e){
    document.getElementById('output').innerText = "❌ 数据接口失败（可能被拦截）";
    return;
  }

  const last = list[0];

  let out = 📊 最后一期：${last}\n\n;

  out += 波色：${getColor(last)}（${getLastStreak(list,n=>getColor(n))}期）\n;
  out += 奇偶：${last%2===0?'偶':'奇'}（${getLastStreak(list,n=>n%2)}期）\n;
  out += 大小：${last>=25?'大':'小'}（${getLastStreak(list,n=>n>=25)}期）\n;
  out += 头数：${Math.floor(last/10)}头（${getLastStreak(list,n=>Math.floor(n/10))}期）\n;

  const rec = predict(list);
  out += \n🔥 推荐号码：${rec.join(', ')};

  const acc = calcAccuracy(list);
  out += \n🎯 命中率：${acc}%;

  document.getElementById('output').innerText = out;

  drawChart(list);
}

</script>

</body>
</html>
